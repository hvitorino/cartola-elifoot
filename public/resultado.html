<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartola Elifoot - Resultado</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="/components/index.js"></script>
</head>
<body>
  <header>
    <h1 id="final-score">0 — 0</h1>
    <p id="match-info">Resultado da Partida</p>
  </header>

  <div class="container">
    <div class="grid grid-cols-2 gap-lg" style="margin: var(--space-xl) 0;">
      <div id="home-stats" class="card elevated">
        <h3 id="home-name" class="text-lg font-bold text-primary">Time da Casa</h3>
        <div class="stat-row">
          <span class="text-secondary">Jogadores:</span>
          <span id="home-players" class="text-highlight">-</span>
        </div>
        <div class="stat-row">
          <span class="text-secondary">Posse:</span>
          <span id="home-possession" class="text-highlight">-</span>%
        </div>
        <div class="stat-row">
          <span class="text-secondary">Artilheiros:</span>
          <span id="home-scorers" class="text-highlight">-</span>
        </div>
      </div>

      <div id="away-stats" class="card elevated">
        <h3 id="away-name" class="text-lg font-bold text-primary">Visitante</h3>
        <div class="stat-row">
          <span class="text-secondary">Jogadores:</span>
          <span id="away-players" class="text-highlight">-</span>
        </div>
        <div class="stat-row">
          <span class="text-secondary">Posse:</span>
          <span id="away-possession" class="text-highlight">-</span>%
        </div>
        <div class="stat-row">
          <span class="text-secondary">Artilheiros:</span>
          <span id="away-scorers" class="text-highlight">-</span>
        </div>
      </div>
    </div>

    <div class="card elevated" style="margin: var(--space-xl) 0;">
      <h3 class="text-lg font-bold text-primary">Destaques</h3>
      <div id="highlights" class="highlights-list">
        <p class="text-secondary">Carregando destaques...</p>
      </div>
    </div>

    <div class="flex flex-center" style="margin: var(--space-xl) 0;">
      <button onclick="proximaRodada()" class="btn btn-primary btn-lg">
        Próxima Rodada &gt;
      </button>
    </div>
  </div>

  <script type="module">
    import * as api from './js/api.js';
    import * as estado from './js/estado.js';

    async function inicializarPagina() {
      const estadoAtual = estado.getEstado();

      if (!estadoAtual.ultimaPartida) {
        window.location.href = 'escalacao.html';
        return;
      }

      const ultima = estadoAtual.ultimaPartida;

      // Display final score
      document.getElementById('final-score').textContent =
        `${ultima.placar.casa} — ${ultima.placar.visitante}`;

      document.getElementById('match-info').textContent =
        `${ultima.adversario.nome}`;

      // Get club names
      const clubs = await api.getClubs();
      const clubAtual = clubs.find(c => c.id === estadoAtual.clubeId);

      document.getElementById('home-name').textContent = clubAtual?.nome || 'Seu Time';
      document.getElementById('away-name').textContent = ultima.adversario.nome;

      // Display stats
      document.getElementById('home-players').textContent = ultima.escalacao.length;
      document.getElementById('away-players').textContent = ultima.adversario.escalacao.length;

      // Calculate possession (home team 60% by default in simulation)
      document.getElementById('home-possession').textContent = '60';
      document.getElementById('away-possession').textContent = '40';

      // Display scorers
      if (ultima.destaques?.artilheiros?.casa?.length > 0) {
        const scorers = ultima.destaques.artilheiros.casa
          .map(s => `${s.nome} (${s.gols})`)
          .join(', ');
        document.getElementById('home-scorers').textContent = scorers;
      } else {
        document.getElementById('home-scorers').textContent = 'Nenhum gol';
      }

      if (ultima.destaques?.artilheiros?.visitante?.length > 0) {
        const scorers = ultima.destaques.artilheiros.visitante
          .map(s => `${s.nome} (${s.gols})`)
          .join(', ');
        document.getElementById('away-scorers').textContent = scorers;
      } else {
        document.getElementById('away-scorers').textContent = 'Nenhum gol';
      }

      // Display highlights
      const highlightsDiv = document.getElementById('highlights');
      highlightsDiv.innerHTML = '';

      const melhorJogadorCasa = ultima.destaques?.melhor_jogador?.casa;
      const melhorJogadorVisitante = ultima.destaques?.melhor_jogador?.visitante;

      if (melhorJogadorCasa?.nome) {
        const p = document.createElement('p');
        p.className = 'highlight-item text-sm text-primary';
        p.textContent = `MVP (Casa): ${melhorJogadorCasa.nome} (Média: ${melhorJogadorCasa.media_num.toFixed(1)})`;
        highlightsDiv.appendChild(p);
      }

      if (melhorJogadorVisitante?.nome) {
        const p = document.createElement('p');
        p.className = 'highlight-item text-sm text-primary';
        p.textContent = `MVP (Visitante): ${melhorJogadorVisitante.nome} (Média: ${melhorJogadorVisitante.media_num.toFixed(1)})`;
        highlightsDiv.appendChild(p);
      }

      // Save result to history
      estado.salvarResultado(ultima);
    }

    window.proximaRodada = function() {
      const estadoAtual = estado.getEstado();
      const novaRodada = (estadoAtual.rodadaAtual || 1) + 1;
      estado.setEstado({
        rodadaAtual: novaRodada,
        escalacaoAtual: [],
        esquemaTatico: '4-4-2'
      });
      window.location.href = 'escalacao.html';
    };

    inicializarPagina();
  </script>
</body>
</html>

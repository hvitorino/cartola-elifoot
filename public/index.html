<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartola Elifoot - Selecione um Clube</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="/components/index.js"></script>
</head>
<body>
  <header>
    <h1>Cartola Elifoot</h1>
    <p>Gerencie seu clube, escalações e partidas!</p>
  </header>

  <div class="container">
    <h2>Escolha um Clube para Gerenciar</h2>

    <div id="loading" class="spinner" style="display: none;"></div>

    <div id="error" class="error error-alert"></div>

    <div id="clubs-container" class="clubs-grid grid grid-cols-auto gap-lg"></div>

    <p id="fallback-text" class="text-secondary" style="display: none;">Escolha um clube da lista</p>
  </div>

  <script type="module">
    import * as api from './js/api.js';
    import * as estado from './js/estado.js';

    async function inicializarPagina() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const clubsContainer = document.getElementById('clubs-container');
      const fallbackText = document.getElementById('fallback-text');

      loading.style.display = 'block';

      try {
        const clubs = await api.getClubs();

        if (!clubs || clubs.length === 0) {
          throw new Error('No clubs returned');
        }

        loading.style.display = 'none';

        clubs.forEach(club => {
          const card = document.createElement('div');
          card.className = 'card elevated';
          card.style.cssText = 'cursor: pointer; padding: var(--space-lg);';
          card.innerHTML = `
            <div style="font-size: 2rem; margin-bottom: var(--space-md);">⚽</div>
            <div style="color: var(--text-primary); font-weight: 600; margin-bottom: var(--space-sm);">${club.nome}</div>
            <div style="color: var(--text-secondary); font-size: 0.9rem;">${club.abreviacao}</div>
          `;

          card.addEventListener('click', () => {
            estado.setEstado({ clubeId: club.id });
            window.location.href = 'escalacao.html';
          });

          clubsContainer.appendChild(card);
        });
      } catch (err) {
        console.error('Error loading clubs:', err);
        loading.style.display = 'none';
        error.textContent = 'Erro ao carregar clubes. Usando dados de fallback.';
        error.classList.add('show');
        fallbackText.style.display = 'block';
      }
    }

    inicializarPagina();
  </script>
</body>
</html>
